body:
  text: 妙玄節要標條釋名體宗用教五章初通釋七一標章二引證三生起四開合五料簡六觀心七會異二別釋第一釋名三一判通別二定前後三正解二初略示次廣說二初法三一眾生二佛三心次妙二一通釋別釋二一迹十妙境智行位三法感應神通說法眷屬功德利益二本十妙因果國土感應神通說法眷屬涅槃壽命利益釋蓮華釋經字第二辨體第三明宗第四論用第五判教妙玄節要標條終妙法蓮華經玄義節要
